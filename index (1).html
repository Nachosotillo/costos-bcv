<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#12161F" />
<title>Costos BCV</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Costos BCV" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#12161F; --surface:#1A2130; --surface-2:#222B3D; --line:#2C3547;
    --text:#ECEFF4; --muted:#8B96AC; --gold:#E7B15A; --gold-dim:#A9843F;
    --pos:#59C39B; --danger:#E4695B;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--ink); color:var(--text); font-family:var(--body);
    -webkit-font-smoothing:antialiased; line-height:1.4;
    padding:0 16px calc(40px + env(safe-area-inset-bottom)) 16px;
    max-width:680px; margin:0 auto;
  }
  h1{font-family:var(--disp); font-weight:700; font-size:1.05rem; letter-spacing:.02em; margin:0}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  button{font-family:var(--body); cursor:pointer; border:none; background:none; color:inherit}
  input{font-family:var(--mono); background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:15px; width:100%}
  input:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(231,177,90,.15)}
  input::placeholder{color:#5C6779}
  label{display:block; font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 5px 2px}

  header{display:flex; align-items:center; gap:10px; padding:20px 2px 14px}
  header .dot{width:9px; height:9px; border-radius:50%; background:var(--muted); flex:none; transition:.3s}
  header .dot.live{background:var(--pos); box-shadow:0 0 10px rgba(89,195,155,.6)}
  header .dot.err{background:var(--danger)}

  .rate{position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,#1A2130 0%,#161C29 100%);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px;
    box-shadow:0 8px 24px rgba(0,0,0,.35); backdrop-filter:blur(6px);}
  .rate .top{display:flex; justify-content:space-between; align-items:baseline}
  .rate .lbl{font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted)}
  .rate .big{font-family:var(--mono); font-weight:600; font-size:2.35rem; color:var(--gold); line-height:1.05; margin:4px 0 2px; letter-spacing:-.01em}
  .rate .big .cur{font-size:1rem; color:var(--gold-dim); margin-right:6px}
  .rate .sub{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px}
  .rate .sub small{font-size:.72rem; color:var(--muted)}
  .refresh{border:1px solid var(--line); border-radius:9px; padding:7px 12px; font-size:.78rem; color:var(--text); background:var(--surface-2); display:inline-flex; align-items:center; gap:6px}
  .refresh:active{transform:scale(.97)}
  .refresh.spin svg{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .settings{display:flex; gap:10px; margin:14px 0 4px}
  .settings .field{flex:1}

  .sec{display:flex; justify-content:space-between; align-items:center; margin:24px 2px 12px}
  .sec h2{font-family:var(--disp); font-size:.82rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin:0}
  .add{border:1px dashed var(--gold-dim); color:var(--gold); border-radius:10px; padding:8px 14px; font-size:.82rem; font-weight:600}
  .add:active{transform:scale(.98)}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px}
  .card .block{margin-bottom:10px}
  .montoline{display:flex; gap:8px; align-items:stretch}
  .montoline input{flex:1}
  .curtoggle{display:flex; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; overflow:hidden; flex:none}
  .curtoggle button{padding:0 13px; font-family:var(--mono); font-size:14px; color:var(--muted); min-width:42px}
  .curtoggle button.on{background:var(--gold); color:#1a1305; font-weight:600}
  .equiv{font-family:var(--mono); font-size:.78rem; color:var(--pos); margin:6px 0 0 2px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .ivatoggle{display:flex; align-items:center; gap:9px; padding:0 12px; border:1px solid var(--line); border-radius:10px; background:var(--surface-2); user-select:none; height:100%}
  .ivatoggle input{width:auto; flex:none}
  .ivatoggle small{font-size:.82rem; color:var(--muted)}
  .ivatoggle.active small{color:var(--text)}

  .breakdown{margin-top:12px; border-top:1px solid var(--line); padding-top:11px}
  .breakdown .li{display:flex; justify-content:space-between; align-items:baseline; font-size:.83rem; margin-bottom:6px}
  .breakdown .li span:first-child{color:var(--muted)}
  .breakdown .li .num{font-size:.85rem}
  .breakdown .li.hide{display:none}
  .unit{margin-top:10px; border-top:1px dashed var(--line); padding-top:11px; display:flex; justify-content:space-between; align-items:baseline; gap:10px}
  .unit .k{font-family:var(--disp); font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--text); font-weight:600}
  .unit .v{font-family:var(--mono); text-align:right}
  .unit .v .bs{color:var(--gold); font-weight:600; font-size:1.25rem; display:block; line-height:1.1}
  .unit .v .usd{color:var(--gold-dim); font-size:.82rem}

  .card .foot{display:flex; justify-content:flex-end; margin-top:10px}
  .del{color:var(--danger); font-size:.78rem; padding:5px 8px; border-radius:8px}
  .del:active{background:rgba(228,105,91,.12)}

  .empty{text-align:center; color:var(--muted); padding:34px 16px; border:1px dashed var(--line); border-radius:14px; font-size:.9rem}
  footer{margin-top:26px; padding-top:16px; border-top:1px solid var(--line); font-size:.72rem; color:var(--muted); line-height:1.6}
  footer a{color:var(--gold-dim)}
</style>
</head>
<body>

<header>
  <div class="dot" id="statusDot"></div>
  <h1>Costos&nbsp;<span style="color:var(--gold)">BCV</span></h1>
</header>

<section class="rate">
  <div class="top">
    <span class="lbl">Tasa oficial · USD</span>
    <span class="lbl num" id="fuente">—</span>
  </div>
  <div class="big"><span class="cur">Bs</span><span id="rateVal">—</span></div>
  <div class="sub">
    <small id="fecha">Cargando…</small>
    <button class="refresh" id="refreshBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Actualizar
    </button>
  </div>
</section>

<div class="settings">
  <div class="field">
    <label for="ivaInput">IVA %</label>
    <input id="ivaInput" class="num" type="number" inputmode="decimal" step="0.1" value="16" />
  </div>
  <div class="field">
    <label for="ganInput">Ganancia %</label>
    <input id="ganInput" class="num" type="number" inputmode="decimal" step="1" value="40" />
  </div>
</div>

<div class="sec">
  <h2>Productos</h2>
  <button class="add" id="addBtn">+ Agregar</button>
</div>

<div id="list"></div>

<footer>
  Fórmula: (Monto total + IVA + Ganancia) ÷ cantidad = valor unitario. Sin IVA se omite el 16%.
  El monto se puede escribir en Bs o en $; la conversión usa la tasa BCV vía
  <a href="https://ve.dolarapi.com/v1/dolares/oficial" target="_blank" rel="noopener">DolarAPI</a> (referencial).
  Tus productos se guardan en este dispositivo.
</footer>

<script>
const mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return k in mem ? mem[k] : null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};

const fmt = new Intl.NumberFormat('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtRate = new Intl.NumberFormat('es-VE',{minimumFractionDigits:2,maximumFractionDigits:4});
let rate = 0, fecha = '', fuente = '';
let products = [];
let settings = { iva:16, gan:40 };

function safeParse(s){ try{ return JSON.parse(s); }catch(e){ return null; } }
function loadState(){
  products = safeParse(store.get('bcv_products')) || [];
  settings = Object.assign(settings, safeParse(store.get('bcv_settings')) || {});
  const cache = safeParse(store.get('bcv_rate_cache'));
  if(cache){ rate=cache.rate; fecha=cache.fecha; fuente=cache.fuente; }
}
function saveProducts(){ store.set('bcv_products', JSON.stringify(products)); }
function saveSettings(){ store.set('bcv_settings', JSON.stringify(settings)); }

async function fetchRate(manual){
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('statusDot');
  if(manual) btn.classList.add('spin');
  try{
    const r = await fetch('https://ve.dolarapi.com/v1/dolares/oficial', {cache:'no-store'});
    if(!r.ok) throw new Error('http '+r.status);
    const d = await r.json();
    const val = d.promedio ?? d.venta ?? d.compra;
    if(!val) throw new Error('sin valor');
    rate = Number(val);
    fecha = d.fechaActualizacion || new Date().toISOString();
    fuente = 'DolarAPI';
    store.set('bcv_rate_cache', JSON.stringify({rate,fecha,fuente}));
    dot.className = 'dot live';
    renderRate(); recalcAll();
  }catch(err){
    dot.className = rate ? 'dot live' : 'dot err';
    if(rate) renderRate();
    console.warn('No se pudo actualizar la tasa:', err);
  }finally{
    if(manual) setTimeout(()=>btn.classList.remove('spin'), 500);
  }
}

function renderRate(){
  document.getElementById('rateVal').textContent = rate ? fmtRate.format(rate) : '—';
  document.getElementById('fuente').textContent = fuente || '—';
  const f = document.getElementById('fecha');
  if(fecha){
    const dt = new Date(fecha);
    f.textContent = !isNaN(dt)
      ? 'Actualizado ' + dt.toLocaleString('es-VE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
      : 'Última tasa conocida';
  } else { f.textContent = 'Sin datos aún'; }
}

/* ---- FÓRMULA ----
   montoBs / montoUSD segun moneda elegida y la tasa BCV.
   factor = 1 + (IVA% si lleva IVA) + Ganancia%.
   subtotal = monto * factor ; valor unitario = subtotal / cantidad. */
function compute(p){
  const monto = Number(p.monto)||0;
  const cant  = Number(p.cant)||0;
  let montoBs, montoUSD;
  if(p.cur === 'usd'){ montoUSD = monto; montoBs = rate ? monto*rate : 0; }
  else { montoBs = monto; montoUSD = rate ? monto/rate : 0; }

  const ivaF = p.iva ? (Number(settings.iva)||0)/100 : 0;
  const ganF = (Number(settings.gan)||0)/100;

  const ivaBs = montoBs*ivaF, ivaUSD = montoUSD*ivaF;
  const ganBs = montoBs*ganF, ganUSD = montoUSD*ganF;
  const subBs = montoBs*(1+ivaF+ganF), subUSD = montoUSD*(1+ivaF+ganF);
  const unitBs = cant>0 ? subBs/cant : 0;
  const unitUSD = cant>0 ? subUSD/cant : 0;
  return {montoBs,montoUSD,ivaBs,ivaUSD,ganBs,ganUSD,subBs,subUSD,unitBs,unitUSD,cant};
}

const list = document.getElementById('list');
function renderList(){
  list.innerHTML = '';
  if(products.length===0){
    list.innerHTML = '<div class="empty">Aún no hay productos. Toca <b style="color:var(--gold)">+ Agregar</b> para crear el primero.</div>';
    return;
  }
  products.forEach(p => list.appendChild(buildCard(p)));
}

function buildCard(p){
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML = `
    <div class="block">
      <label>Producto</label>
      <input data-f="name" type="text" placeholder="Nombre" value="${escapeAttr(p.name||'')}" />
    </div>
    <div class="block">
      <label>Monto total</label>
      <div class="montoline">
        <input data-f="monto" class="num" type="number" inputmode="decimal" step="0.01" placeholder="0,00" value="${p.monto ?? ''}" />
        <div class="curtoggle">
          <button data-cur="bs">Bs</button>
          <button data-cur="usd">$</button>
        </div>
      </div>
      <div class="equiv" data-o="equiv">—</div>
    </div>
    <div class="grid2 block">
      <div>
        <label>Cantidad</label>
        <input data-f="cant" class="num" type="number" inputmode="numeric" step="1" placeholder="0" value="${p.cant ?? ''}" />
      </div>
      <div>
        <label>&nbsp;</label>
        <label class="ivatoggle"><input data-f="iva" type="checkbox" ${p.iva?'checked':''}/><small>¿Lleva IVA?</small></label>
      </div>
    </div>
    <div class="breakdown">
      <div class="li"><span>Monto total</span><span class="num" data-o="monto">—</span></div>
      <div class="li" data-ivarow><span>IVA <span data-o="ivapct"></span></span><span class="num" data-o="iva">—</span></div>
      <div class="li"><span>Ganancia <span data-o="ganpct"></span></span><span class="num" data-o="gan">—</span></div>
      <div class="li"><span>Subtotal ÷ <span data-o="cant">0</span></span><span class="num" data-o="sub">—</span></div>
      <div class="unit">
        <span class="k">Valor unitario</span>
        <span class="v"><span class="bs" data-o="unitbs">—</span><span class="usd" data-o="unitusd">—</span></span>
      </div>
    </div>
    <div class="foot"><button class="del">Eliminar</button></div>
  `;
  if(!p.cur) p.cur='bs';
  const curBtns = card.querySelectorAll('.curtoggle button');
  const setCur = ()=>curBtns.forEach(b=>b.classList.toggle('on', b.dataset.cur===p.cur));
  setCur();
  curBtns.forEach(b=>b.addEventListener('click', ()=>{ p.cur=b.dataset.cur; setCur(); saveProducts(); recalcCard(card,p); }));

  card.querySelectorAll('input').forEach(inp=>{
    const f = inp.dataset.f;
    const ev = inp.type==='checkbox' ? 'change' : 'input';
    inp.addEventListener(ev, ()=>{
      p[f] = inp.type==='checkbox' ? inp.checked : inp.value;
      const ivt = card.querySelector('.ivatoggle');
      if(f==='iva' && ivt) ivt.classList.toggle('active', inp.checked);
      saveProducts(); recalcCard(card,p);
    });
  });
  const ivt = card.querySelector('.ivatoggle');
  if(ivt) ivt.classList.toggle('active', !!p.iva);

  card.querySelector('.del').addEventListener('click', ()=>{
    products = products.filter(x=>x!==p); saveProducts(); renderList();
  });
  recalcCard(card,p);
  return card;
}

function recalcCard(card,p){
  const c = compute(p);
  const q = s => card.querySelector(`[data-o="${s}"]`);
  const bs = v => 'Bs ' + fmt.format(v);
  const usd = v => '$ ' + fmt.format(v);

  // equivalente bajo el monto
  if(!rate){ q('equiv').textContent = 'Esperando tasa BCV…'; }
  else if(p.cur==='usd'){ q('equiv').textContent = '= ' + bs(c.montoBs); }
  else { q('equiv').textContent = '= ' + usd(c.montoUSD); }

  q('monto').textContent = bs(c.montoBs) + '  /  ' + usd(c.montoUSD);
  q('ivapct').textContent = (Number(settings.iva)||0) + '%';
  q('ganpct').textContent = (Number(settings.gan)||0) + '%';
  q('iva').textContent = bs(c.ivaBs) + '  /  ' + usd(c.ivaUSD);
  q('gan').textContent = bs(c.ganBs) + '  /  ' + usd(c.ganUSD);
  q('cant').textContent = c.cant || 0;
  q('sub').textContent = bs(c.subBs) + '  /  ' + usd(c.subUSD);
  q('unitbs').textContent = bs(c.unitBs);
  q('unitusd').textContent = usd(c.unitUSD);

  const ivarow = card.querySelector('[data-ivarow]');
  if(ivarow) ivarow.classList.toggle('hide', !p.iva);
}

function recalcAll(){
  [...list.children].forEach((card,i)=>{ if(products[i]) recalcCard(card, products[i]); });
}
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

document.getElementById('addBtn').addEventListener('click', ()=>{
  const p = { id:Date.now(), name:'', monto:'', cur:'bs', cant:'', iva:true };
  products.push(p); saveProducts();
  if(products.length===1) renderList();
  else list.appendChild(buildCard(p));
  const cards = list.querySelectorAll('.card');
  const last = cards[cards.length-1];
  if(last){ last.scrollIntoView({behavior:'smooth',block:'center'}); last.querySelector('input').focus(); }
});

document.getElementById('refreshBtn').addEventListener('click', ()=>fetchRate(true));

const ivaInput = document.getElementById('ivaInput');
ivaInput.value = settings.iva;
ivaInput.addEventListener('input', ()=>{ settings.iva = ivaInput.value; saveSettings(); recalcAll(); });
const ganInput = document.getElementById('ganInput');
ganInput.value = settings.gan;
ganInput.addEventListener('input', ()=>{ settings.gan = ganInput.value; saveSettings(); recalcAll(); });

document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) fetchRate(false); });
setInterval(()=>fetchRate(false), 30*60*1000);

loadState(); renderRate(); renderList(); fetchRate(false);
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
